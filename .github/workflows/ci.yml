name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ====================== 1. 自动化测试 ======================
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: ["ubuntu-latest"]

    steps:
    - uses: actions/checkout@v4
    - name: 设置 Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: 使用 Black 进行代码检查
      run: |
        black --check --diff --line-length 100 .
    - name: 使用 Ruff 进行代码检查
      run: |
        ruff check .
    - name: 使用 Pytest 运行测试
      run: |
        pytest

  # ====================== 2. 构建并推送Docker镜像 ======================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: 登录 Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 设置 Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 构建并推送 Docker 镜像
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/greet-service:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ====================== 3. 自动部署到你的服务器 ======================
  deploy:
    needs: build-and-push  # 只有镜像构建成功，才会部署
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: 部署到云服务器
      uses: appleboy/ssh-action@v1.0.0
      with:
        # 服务器信息（需要你在GitHub Secrets里配置）
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        
        # 服务器上自动执行的命令（核心部署逻辑）
        script: |
          # 1. 登录Docker Hub（拉取最新镜像）
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          
          # 2. 拉取最新版镜像
          docker pull ${{ secrets.DOCKER_USERNAME }}/greet-service:latest
          
          # 3. 停止并删除旧容器（如果存在）
          docker stop greet-service || true
          docker rm greet-service || true
          
          # 4. 启动新容器（端口 8000，开机自启）
          docker run -d \
            --name greet-service \
            -p 8000:8000 \
            --restart=always \
            ${{ secrets.DOCKER_USERNAME }}/greet-service:latest
          
          # 5. 检查服务是否启动成功
          echo "Waiting for service to be ready..."
          for i in {1..15}; do
            sleep 2
            if curl -f http://localhost:8000; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Retry $i/15..."
          done
          echo "Service failed to start within timeout"
          docker logs greet-service --tail 20   # 输出日志帮助调试
          exit 1